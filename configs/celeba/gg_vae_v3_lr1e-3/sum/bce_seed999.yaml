# CelebA GG-VAE (Gradient-Guided VAE) - 10 epochs, batch 64 - Sum
dataset: CelebA
data_dir: ../data
normalize: false
arch: gg_vae_v3
latent_dim: 1024
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 0.00039319, 1.0, 1.0]
recons_dist: bernoulli
recons_reduction: mean
epochs: 100
batch_size: 64
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: sum
seed: 999
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 64
hv_ref: [1.1, 1.1, 1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba gg_vae_v3 w_kl=3.93e-4 lr1e-3 wd1e-5 sum seed999
wandb_group: celeba gg_vae_v3 w_kl=3.93e-4 lr1e-3 wd1e-5 sum
