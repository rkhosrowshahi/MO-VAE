# CelebA GG-VAE - 10ep 64bs - COMFORT (MGDA + UPGrad, beta schedule)
dataset: CelebA
data_dir: ../data
normalize: false
arch: vae
latent_dim: 1024
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 0.00078639]
recons_dist: bernoulli
recons_reduction: mean
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: comfort
mgda_epsilon: 1e-5
mgda_max_iters: 250
mgda_min_eigenvalue_eps: 1e-10
comfort_mgda_norm_type: none
comfort_beta_k: 1.0
comfort_beta_a: 1.0
comfort_beta_l: 0.01
comfort_beta_u: 1.0
seed: 42
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 9
hv_ref: [1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba vae w_kl=7.86e-4 lr1e-3 wd1e-5 comfort seed42
wandb_group: celeba vae w_kl=7.86e-4 lr1e-3 wd1e-5 comfort
