# ImageNet VQ-VAE Configuration - Aligned MTL Aggregator (BCE)
# This configuration trains a VQ-VAE on ImageNet dataset with BCE mean objectives


# Dataset settings
dataset: imagenet
data_dir: ../data/imagenet
normalize: false
# Model architecture
arch: vq_vae
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
loss_weights: [1.0, 1.0, 0.25]
recons_dist: bernoulli
recons_reduction: mean
# Training settings
epochs: 20
batch_size: 128
optimizer: adam
lr: 1e-4
scheduler: cosine
scheduler_lr_min: 1e-6
wd: 0.0
aggregator: aligned_mtl
seed: 42
# Logging settings
save_path: logs/
save_freq: 1
eval_freq: 1
num_samples: 4
# Hypervolume reference points (VQ-VAE has 3 objectives: reconstruction_loss, embedding_loss, commitment_loss)
hv_ref: [1.1, 1.1, 1.1]
# Wandb settings
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: imagenet-vq_vae-512k-64d-amtl-seed42
wandb_group: imagenet-vq_vae-512k-64d-amtl

