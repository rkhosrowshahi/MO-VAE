seed: 12341234
save_path: logs/
save_freq: 200
eval_freq: 200
num_vis_samples: 4
hv_ref:
  reconstruction_loss: 1.1
  embedding_loss: 1.1
  commitment_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: oxford_flower_102-vq_vae-512k-64d-mgda_gn-seed12341234
wandb_group: oxford_flower_102-vq_vae-512k-64d-mgda_gn
