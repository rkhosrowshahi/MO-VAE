dataset: CelebA
data_dir: ../data
normalize_inputs: true
arch: vq_vae
embedding_dim: 64
num_embeddings: 512
hidden_dims:
- 128
- 256
loss_weights:
  reconstruction_loss: 1.0
  embedding_loss: 1.0
  commitment_loss: 0.25
recons_objective: mse
recons_activation: none
hv_ref:
  reconstruction_loss: 1.1
  embedding_loss: 1.1
  commitment_loss: 1.1
epochs: 200
batch_size: 64
optimizer: adam
lr: 2e-4
wd: 0.0
aggregator: upgrad
seed: 12341234
save_path: logs/
save_freq: 10
eval_freq: 10
num_vis_samples: 9
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba vq_vae 512k 64d upgrad [1*mse + 1*embedding + 0.25*commitment]
  seed12341234
wandb_group: celeba vq_vae 512k 64d upgrad [1*mse + 1*embedding + 0.25*commitment]
