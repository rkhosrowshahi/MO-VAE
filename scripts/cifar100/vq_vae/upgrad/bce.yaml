# CIFAR100 VQ-VAE Configuration - UPGrad Aggregator (BCE)
# This configuration trains a VQ-VAE on CIFAR100 dataset with BCE mean objective

dataset: cifar100
arch: vq_vae
epochs: 100
batch_size: 128
optimizer: adam
lr: 3e-4
wd: 0.0
aggregator: upgrad
normalize: false

# Model architecture
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
objs: [bce_mean]
beta: 0.25
output_activation: sigmoid

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points (VQ-VAE has 3 objectives: reconstruction_loss, commitment_loss, embedding_loss)
hv_ref: [1.1, 1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "cifar100 vq_vae bce upgrad"


