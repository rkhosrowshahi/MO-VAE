# CELEBA BetaTC-VAE Configuration - MGDA Aggregator
# This configuration trains a BetaTC-VAE on CELEBA dataset

dataset: CelebA
arch: betatc_vae
epochs: 10
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: mgda
normalize: true

# Model architecture
latent_dim: 128
hidden_dims: [32, 32, 64, 64]
beta: 6.0
alpha: 1.0
gamma: 1.0
anneal_steps: 10000
recons_weight: 8.138020833333333e-05
output_activation: tanh
recons_dist: gaussian
recons_reduction: sum

# Training settings
seed: 42
num_workers: 4
device: cuda:0
save_path: logs/
save_freq: 2
num_samples: 64

# Hypervolume reference points
hv_ref: [1.1, 1.1, 1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "celeba 128d betatc_vae MGDA"

