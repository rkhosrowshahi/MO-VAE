dataset: CelebA
data_dir: ../data
normalize_inputs: true
arch: cycle_vae
latent_dim: 128
hidden_dims:
- 32
- 64
- 128
- 256
- 512
loss_weights:
  reconstruction_loss: 1.0
  cycle_loss: 0.001573
recons_objective: mse
recons_activation: none
epochs: 100
batch_size: 256
optimizer: adam
lr: 0.001
wd: 1e-5
