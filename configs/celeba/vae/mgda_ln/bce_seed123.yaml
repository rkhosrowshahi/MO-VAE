# CelebA VAE Configuration - MGDA L2 Aggregator (BCE + KLD)
# This configuration trains a VAE on CelebA dataset with BCE mean and KL objectives


# Dataset settings
dataset: CelebA
data_dir: ../data
normalize: false
# Model architecture
arch: vae
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 0.00025]
recons_dist: bernoulli
recons_reduction: mean
# Training settings
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: mgda_ln
mgda_epsilon: 1e-5
mgda_max_iters: 250
seed: 123
# Logging settings
save_path: logs/
save_freq: 10
eval_freq: 10
num_samples: 9
# Hypervolume reference points (VAE has 2 objectives: reconstruction_loss, kl_loss)
hv_ref: [1.1, 1.1]
# Wandb settings
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba 128d bce+kld mgda_ln seed123
wandb_group: celeba 128d bce+kld mgda_ln
