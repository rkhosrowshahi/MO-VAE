# CelebA VAE Configuration - DualProj Aggregator (BCE + KLD)
# This configuration trains a VAE on CelebA dataset with BCE mean and KL objectives

dataset: CelebA
arch: vae
epochs: 10
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0001
aggregator: dualproj
normalize: false

# Model architecture
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
objs: [bce_mean, kld]
kld_weight: 2.5e-4
output_activation: sigmoid

# Training settings
seed: 42
num_workers: 4
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref_recon: 1.1
hv_ref_kl: 1.1

# Wandb settings (optional)
use_wandb: false
wandb_project: mo-vae
wandb_entity: rasa_thesis
wandb_name: "celeba 128d bce+kld dualproj"


