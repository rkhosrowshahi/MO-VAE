dataset: CelebA
data_dir: ../data
normalize_inputs: true
arch: vae
latent_dim: 128
hidden_dims:
- 32
- 64
- 128
- 256
- 512
loss_weights:
  reconstruction_loss: 1.0
  kld_loss: 0.00025
recons_objective: mse
recons_activation: none
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: mgda_lgn
mgda_epsilon: 1e-5
mgda_max_iters: 250
seed: 12341234
save_path: logs/
save_freq: 10
eval_freq: 10
num_vis_samples: 9
hv_ref:
  reconstruction_loss: 1.1
  kld_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba 128d mse+kld mgda_lgn seed12341234
wandb_group: celeba 128d mse+kld mgda_lgn
