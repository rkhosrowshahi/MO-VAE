# Animal-Face VAE - MGDA (Loss+ / LGN) Aggregator
dataset: animal-face
data_dir: ../data
normalize: false
arch: vae
latent_dim: 4096
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 0.01587]
recons_dist: bernoulli
recons_reduction: mean
epochs: 1000
batch_size: 128
optimizer: adam
lr: 1e-4
wd: 0.0
scheduler: cosine
scheduler_lr_min: 1e-6
aggregator: mgda_lgn
seed: 12341234
save_path: logs/
save_freq: 200
eval_freq: 200
num_samples: 4
hv_ref: [1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: animal_face-vae-128d-w_kl=0.01587-lr1e-3-mgda_lgn-seed12341234
wandb_group: animal_face-vae-128d-w_kl=0.01587-lr1e-3-mgda_lgn
