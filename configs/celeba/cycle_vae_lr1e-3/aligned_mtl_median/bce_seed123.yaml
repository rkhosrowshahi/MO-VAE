# CelebA Cycle VAE - 100ep 64bs - Aligned MTL (median scale, seed 123)
dataset: CelebA
data_dir: ../data
normalize: false
arch: cycle_vae
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 1.573e-3]
recons_dist: bernoulli
recons_reduction: mean
epochs: 100
batch_size: 256
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: aligned_mtl_median
seed: 123
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 9
hv_ref: [1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-5 aligned_mtl_median seed123
wandb_group: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-5 aligned_mtl_median
