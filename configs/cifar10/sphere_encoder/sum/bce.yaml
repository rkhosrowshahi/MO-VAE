# Sphere Encoder (arXiv:2602.15030) on CIFAR-10
# One-step/few-step image generation with spherical latent space.
dataset: CIFAR10
data_dir: ../data
normalize: true
arch: sphere_encoder
latent_dim: 2048
hidden_dims: [32, 64, 128, 256, 512]
recons_dist: gaussian
recons_reduction: mean
sigma_max_angle_deg: 80.0
sigma_mix_prob: 0.1
sigma_mix_angle_min_deg: 80.0
sigma_mix_angle_max_deg: 85.0
lambda_pix_recon: 1.0
lambda_pix_con: 0.5
lambda_lat_con: 0.1
epochs: 100
batch_size: 128
optimizer: adamw
lr: 0.0001
wd: 0.0
scheduler: cosine
scheduler_lr_min: 1.0e-6
aggregator: sum
seed: 42
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 64
hv_ref: [1.1, 1.1]
use_wandb: false
