dataset: celeba-hq
data_dir: ../data
normalize_inputs: false
arch: vq_vae
embedding_dim: 64
num_embeddings: 512
hidden_dims:
- 128
- 256
loss_weights:
  reconstruction_loss: 1.0
  embedding_loss: 1.0
  commitment_loss: 0.25
recons_objective: bce
recons_activation: sigmoid
epochs: 400
batch_size: 128
optimizer: adam
lr: 1e-4
scheduler: cosine
scheduler_lr_min: 1e-6
wd: 0.0
aggregator: mgda
seed: 42
save_path: logs/
save_freq: 50
eval_freq: 50
num_vis_samples: 4
hv_ref:
  reconstruction_loss: 1.1
  embedding_loss: 1.1
  commitment_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba_hq-vq_vae-512k-64d-mgda-seed42
wandb_group: celeba_hq-vq_vae-512k-64d-mgda
