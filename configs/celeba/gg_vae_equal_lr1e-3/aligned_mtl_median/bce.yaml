# CelebA GG-VAE - 10ep 64bs - Aligned MTL (median scale)
dataset: CelebA
data_dir: ../data
normalize: false
arch: gg_vae
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 1.0, 1.0, 1.0]
recons_dist: bernoulli
recons_reduction: mean
epochs: 100
batch_size: 64
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: aligned_mtl_median
seed: 42
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 64
hv_ref: [1.1, 1.1, 1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba gg_vae 100ep 64bs lr1e-3 wd1e-5 aligned_mtl_median seed42
wandb_group: celeba gg_vae 100ep 64bs lr1e-3 wd1e-5 aligned_mtl_median
