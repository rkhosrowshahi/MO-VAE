# CelebA-HQ VAE Configuration - Aligned MTL Median Aggregator (BCE + KLD)
# This configuration trains a VAE on CelebA-HQ dataset with BCE mean and KL objectives


# Dataset settings
dataset: celeba-hq
data_dir: ../data
normalize: false
# Model architecture
arch: vae
latent_dim: 4096
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 1.0e-4, 1.0]
recons_dist: bernoulli
recons_reduction: mean
# Training settings
epochs: 400
batch_size: 128
optimizer: adam
lr: 1e-4
wd: 0
scheduler: cosine
scheduler_lr_min: 1e-6
aggregator: aligned_mtl_median
seed: 42
# Logging settings
save_path: logs/
save_freq: 50
eval_freq: 50
num_samples: 4
# Hypervolume reference points (VAE has 2 objectives: reconstruction_loss, kl_loss)
hv_ref: [1.1, 1.1, 1.1]
# Wandb settings
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba_hq-vae-4096d-1.0e-4*kld-amtl_median-seed42
wandb_group: celeba_hq-vae-4096d-1.0e-4*kld-amtl_median

