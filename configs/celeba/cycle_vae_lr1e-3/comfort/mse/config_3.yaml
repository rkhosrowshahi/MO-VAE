comfort_beta_k: 1.0
comfort_beta_a: 1.0
comfort_beta_l: 0.01
comfort_beta_u: 1.0
seed: 12341234
save_path: logs/
save_freq: 10
eval_freq: 1
num_vis_samples: 9
hv_ref:
  reconstruction_loss: 1.1
  cycle_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-5 comfort seed12341234-mse
wandb_group: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-5 comfort-mse
