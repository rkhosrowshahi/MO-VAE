# CELEBA VAE Configuration - Sum Aggregator (MSE+KLD)
# This configuration trains a VAE on CELEBA dataset with MSE and KL objectives

dataset: CelebA
arch: vae
epochs: 10
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: sum
normalize: true

# Model architecture
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
kld_weight: 1.0
recons_weight: 8.138020833333333e-05
output_activation: tanh
recons_dist: gaussian
recons_reduction: sum

# Training settings
seed: 42
num_workers: 4
device: cuda:0
save_path: logs/
save_freq: 2
num_samples: 64

# Hypervolume reference points
hv_ref: [1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "celeba 128d mse+kld sum"

