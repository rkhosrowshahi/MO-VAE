# CIFAR100 VQ-VAE Configuration - Sum Objectives
# This configuration trains a VQ-VAE on CIFAR100 dataset with MSE mean objective

dataset: cifar100
arch: vq_vae
epochs: 10
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0001
aggregator: sum
normalize: true

# Model architecture
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
objs: [mse_mean]
beta: 0.25
output_activation: tanh

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref_recon: 1.1

# Wandb settings (optional)
use_wandb: false
wandb_project: mo-vae
wandb_entity: rasa_thesis
wandb_name: "cifar100 vq_vae mse sum"


