dataset: CelebA
data_dir: ../data
normalize_inputs: true
arch: cycle_vae
latent_dim: 128
hidden_dims:
- 32
- 64
- 128
- 256
- 512
loss_weights:
  reconstruction_loss: 1.0
  cycle_loss: 0.001573
recons_objective: mse
recons_activation: none
epochs: 100
batch_size: 256
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: aligned_mtl
seed: 42
save_path: logs/
save_freq: 10
eval_freq: 1
num_vis_samples: 9
hv_ref:
  reconstruction_loss: 1.1
  cycle_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-5 aligned_mtl_min seed42-mse
wandb_group: celeba cycle_vae 100ep 64bs lr1e-3 wd1e-mse-5 aligned_mtl_min
