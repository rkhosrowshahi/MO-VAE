# CelebA-HQ VQ-VAE Configuration - UpGrad Aggregator (BCE)
# This configuration trains a VQ-VAE on CelebA-HQ dataset with BCE mean objectives


# Dataset settings
dataset: celeba-hq
data_dir: ../data
normalize: false
# Model architecture
arch: vq_vae2
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
loss_weights: [1.0, 1.0, 0.25]
recons_dist: bernoulli
recons_reduction: mean
# Training settings
epochs: 400
batch_size: 128
optimizer: adam
lr: 1e-4
scheduler: cosine
scheduler_lr_min: 1e-6
wd: 0.0
aggregator: upgrad
seed: 42
# Logging settings
save_path: logs/
save_freq: 50
eval_freq: 50
num_samples: 4
# Hypervolume reference points (VQ-VAE has 3 objectives: reconstruction_loss, embedding_loss, commitment_loss)
hv_ref: [1.1, 1.1, 1.1]
# Wandb settings
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba_hq-vq_vae2-512k-64d-upgrad-seed42
wandb_group: celeba_hq-vq_vae2-512k-64d-upgrad

