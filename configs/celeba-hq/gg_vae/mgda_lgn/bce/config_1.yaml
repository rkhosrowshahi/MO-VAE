dataset: celeba-hq
data_dir: ../data
normalize_inputs: false
arch: gg_vae
latent_dim: 512
hidden_dims:
- 32
- 64
- 128
- 256
- 512
- 1024
loss_weights:
  reconstruction_loss: 1.0
  kld_loss: 0.004
  gradient_guided_loss: 1.0
  edge_matching_loss: 1.0
recons_objective: bce
recons_activation: sigmoid
epochs: 500
batch_size: 128
optimizer: adam
lr: 1e-4
wd: 0
scheduler: cosine
scheduler_lr_min: 1e-6
aggregator: mgda_lgn
mgda_epsilon: 1e-5
mgda_max_iters: 250
seed: 42
save_path: logs/
save_freq: 50
eval_freq: 50
num_vis_samples: 4
hv_ref:
  reconstruction_loss: 1.1
  kld_loss: 1.1
  gradient_guided_loss: 1.1
  edge_matching_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba_hq-gg_vae-512d-4e-3*kld-bce-mgda_lgn-seed42
wandb_group: celeba_hq-gg_vae-512d-4e-3*kld-bce-mgda_lgn
