dataset: animal-face
data_dir: ../data
normalize_inputs: true
arch: gg_vae
latent_dim: 4096
hidden_dims:
- 32
- 64
- 128
- 256
- 512
loss_weights:
  reconstruction_loss: 1.0
  kld_loss: 0.01587
  gradient_guided_loss: 1.0
  edge_matching_loss: 1.0
recons_objective: mse
recons_activation: none
epochs: 1000
batch_size: 128
optimizer: adam
lr: 1e-4
wd: 0.0
scheduler: cosine
scheduler_lr_min: 1e-6
aggregator: mgda_lgn
seed: 123123
save_path: logs/
save_freq: 200
eval_freq: 200
num_vis_samples: 4
hv_ref:
  reconstruction_loss: 1.1
  kld_loss: 1.1
  gradient_guided_loss: 1.1
  edge_matching_loss: 1.1
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: animal_face-gg_vae-128d-mgda_lgn-seed123123123-mse
wandb_group: animal_face-gg_vae-128d-mgda_lgn-mse
