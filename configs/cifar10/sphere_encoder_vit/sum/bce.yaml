# Sphere Encoder ViT (paper architecture) on CIFAR-10
# ViT + MLP-Mixer + RoPE + sinusoidal; L=2048, patch_size=2 -> 16x16 patches, 8 latent channels
dataset: CIFAR10
data_dir: ../data
normalize: true
arch: sphere_encoder_vit
latent_dim: 2048
patch_size: 2
vit_embed_dim: 1024
vit_depth: 24
vit_num_heads: 16
vit_mixer_depth: 2
sigma_max_angle_deg: 80.0
sigma_mix_prob: 0.1
sigma_mix_angle_min_deg: 80.0
sigma_mix_angle_max_deg: 85.0
lambda_pix_recon: 1.0
lambda_pix_con: 0.5
lambda_lat_con: 0.1
epochs: 100
batch_size: 128
optimizer: adamw
lr: 0.0001
wd: 0.0
scheduler: cosine
scheduler_lr_min: 1.0e-6
aggregator: sum
seed: 42
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 64
hv_ref: [1.1, 1.1]
use_wandb: false
