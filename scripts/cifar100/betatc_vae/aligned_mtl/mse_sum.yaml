# CIFAR100 BetaTC-VAE Configuration - Aligned MTL Aggregator
# This configuration trains a BetaTC-VAE on CIFAR100 dataset

dataset: cifar100
arch: betatc_vae
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: aligned_mtl
normalize: true

# Model architecture
latent_dim: 128
hidden_dims: [32, 32, 64, 64]
beta: 6.0
alpha: 1.0
gamma: 1.0
anneal_steps: 10000
recons_weight: 0.0003255208333333333
output_activation: tanh
recons_dist: gaussian
recons_reduction: sum

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref: [1.1, 1.1, 1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "cifar100 128d betatc_vae aligned_mtl"

