# CIFAR100 GG-VQ-VAE Configuration - JD Sum Aggregator (MSE)
# This configuration trains a GG-VQ-VAE on CIFAR100 dataset with MSE sum objectives

dataset: cifar100
arch: gg_vq_vae
epochs: 100
batch_size: 128
optimizer: adam
lr: 3e-4
wd: 0.0
aggregator: jd_sum
normalize: true

# Model architecture
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
loss_weights: [1.0, 60.0, 1.0, 0.25]
output_activation: tanh
recons_dist: gaussian
recons_reduction: sum

# Training settings
seed: 42
num_workers: 4
device: cuda:0
save_path: logs/
save_freq: 10
eval_freq: 10
num_samples: 64

# Hypervolume reference points (GG-VQ-VAE has 4 objectives: reconstruction_loss, gradient_guided_loss, commitment_loss, embedding_loss)
hv_ref: [1.1, 1.1, 1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "cifar100 gg_vq_vae mse_sum jd_sum"

