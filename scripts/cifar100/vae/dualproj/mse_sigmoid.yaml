# CIFAR100 VAE Configuration - DualProj Aggregator (MSE + KLD with Sigmoid)
# This configuration trains a VAE on CIFAR100 dataset with MSE mean and KL objectives using sigmoid output

dataset: cifar100
arch: vae
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0
aggregator: dualproj
normalize: false

# Model architecture
latent_dim: 128
hidden_dims: [32, 64, 128, 256]
kld_weight: 0.00025
output_activation: sigmoid
recons_dist: gaussian
recons_reduction: mean

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref: [1.1, 1.1]

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "cifar100 128d mse+kld sigmoid dualproj"



