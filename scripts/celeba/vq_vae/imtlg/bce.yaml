# CelebA VQ-VAE Configuration - IMTLG Aggregator (BCE)
# This configuration trains a VQ-VAE on CelebA dataset with BCE mean objective

dataset: CelebA
arch: vq_vae
epochs: 10
batch_size: 128
optimizer: adam
lr: 0.001
wd: 0.0001
aggregator: imtlg
normalize: false

# Model architecture
embedding_dim: 64
num_embeddings: 512
hidden_dims: [32, 64, 128, 256, 512]
objs: [bce_mean]
beta: 0.25
output_activation: sigmoid

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref_recon: 1.1

# Wandb settings (optional)
use_wandb: false
wandb_project: mo-vae
wandb_entity: rasa_thesis
wandb_name: "celeba vq_vae bce IMTL-G"


