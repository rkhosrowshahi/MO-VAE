# CelebA Recursive KL VAE - 100ep 64bs - COMFORT (seed 999)
dataset: CelebA
data_dir: ../data
normalize: false
arch: recursive_kl_vae
latent_dim: 128
hidden_dims: [32, 64, 128, 256, 512]
loss_weights: [1.0, 0.00025]
recons_dist: bernoulli
recons_reduction: mean
epochs: 100
batch_size: 64
optimizer: adam
lr: 0.001
wd: 1e-5
scheduler: exponential
scheduler_gamma: 0.95
aggregator: comfort
mgda_epsilon: 1e-5
mgda_max_iters: 250
mgda_min_eigenvalue_eps: 1e-10
comfort_mgda_norm_type: none
comfort_beta_k: 1.0
comfort_beta_a: 1.0
comfort_beta_l: 0.01
comfort_beta_u: 1.0
seed: 999
save_path: logs/
save_freq: 10
eval_freq: 1
num_samples: 64
hv_ref: [1.1, 1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba recursive_kl_vae 100ep 64bs lr1e-3 wd1e-5 comfort seed999
wandb_group: celeba recursive_kl_vae 100ep 64bs lr1e-3 wd1e-5 comfort
