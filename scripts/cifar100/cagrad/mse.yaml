# CIFAR100 VAE Configuration - CAGrad Aggregator
# This configuration trains a VAE on CIFAR100 dataset with MSE mean and KL objectives

dataset: cifar100
arch: vae
epochs: 100
batch_size: 128
optimizer: adam
lr: 0.001
wd: 1e-4
aggregator: cagrad
normalize: true

# Model architecture
latent_dim: 128
hidden_dims: [32, 64, 128, 256]
objs: [mse_mean, kld]
kld_weight: 2.5e-4
output_activation: tanh

# Training settings
seed: 42
device: cuda:0
save_path: logs/
save_freq: 10
num_samples: 64

# Hypervolume reference points
hv_ref_recon: 1.1
hv_ref_kl: 1.1

# Wandb settings (optional)
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: "cifar100 128d mse+kld CAGrad"


