# CelebA-HQ VQ-VAE - MGDA GN (3 losses)
dataset: CelebA-HQ
data_dir: ../data
normalize: false
arch: vq_vae
embedding_dim: 64
num_embeddings: 512
hidden_dims: [128, 256]
loss_weights: [1.0, 1.0, 0.25]
recons_dist: bernoulli
recons_reduction: mean
epochs: 200
batch_size: 128
optimizer: adam
lr: 2e-4
wd: 0.0
scheduler: cosine
scheduler_lr_min: 1e-6
aggregator: mgda_gn
seed: 42
save_path: logs/
save_freq: 50
eval_freq: 20
num_samples: 4
hv_ref: [1.1, 1.1, 1.1]
use_wandb: true
wandb_project: mo-vae
wandb_entity: rasa_research
wandb_name: celeba_hq-vq_vae-512k-64d-mgda_gn-seed42
wandb_group: celeba_hq-vq_vae-512k-64d-mgda_gn
